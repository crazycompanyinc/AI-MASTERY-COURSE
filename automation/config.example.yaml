# Automation Configuration
# Copy to config.yaml and customize

update:
  branch: auto-update
  commit: false
  push: false

sources:
  arxiv:
    categories: ["cs.AI", "cs.LG", "cs.CL", "cs.CV"]
    max_results: 10
  rss:
    feeds:
      - name: arXiv cs.AI
        url: https://arxiv.org/rss/cs.AI
      - name: Hugging Face
        url: https://huggingface.co/blog/feed.xml

logging:
  level: INFO
  dir: logs
