name: Daily AI News Update
on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: pull-requests

jobs:
  news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests beautifulsoup4 feedparser pyyaml python-dateutil rich tqdm
      - name: Run news update
        run: python automation/daily_news_update.py
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: auto/news-update
          title: '📰 Daily AI News Update'
          body: 'Automated AI news and trend update'
          commit-message: '📰 Daily AI news update'
