name: Link Check
on:
  schedule:
    - cron: '0 10 * * 1'
  workflow_dispatch:

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests
      - name: Check links
        run: python tools/check_links.py
        continue-on-error: true
